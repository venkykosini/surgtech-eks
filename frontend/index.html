<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venky EKS Frontend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero">
      <section class="card">
        <div class="badge">Amazon EKS Demo</div>
        <h1>Hello Venky and Prabha, this is the EKS front end</h1>
        <p>
          A lightweight frontend running on Kubernetes, deployed through AWS
          CodePipeline and CodeBuild.
        </p>
        <div class="stats">
          <div class="stat">
            <span class="label">Frontend</span>
            <span class="value">Nginx</span>
          </div>
          <div class="stat">
            <span class="label">Backend</span>
            <span class="value" id="api-status">Checking...</span>
          </div>
          <div class="stat">
            <span class="label">Platform</span>
            <span class="value">Amazon EKS</span>
          </div>
        </div>
        <canvas id="orbits" width="420" height="220" aria-label="Decorative graphic"></canvas>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
